<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>paperforge review</title>
<script>
window.MathJax = { tex: { inlineMath: [['\\(', '\\)']],
                          displayMath: [['\\[', '\\]']] },
                   options: { ignoreHtmlClass: 'nojax' } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js" async></script>
<style>
:root { --bg:#fff; --fg:#16181d; --muted:#5c6470; --card:#f6f7f9;
        --line:#d8dce3; --acc:#2563eb; --ok:#15803d; --bad:#b91c1c; }
@media (prefers-color-scheme: dark) {
  :root { --bg:#14161a; --fg:#e7e9ee; --muted:#9aa3b2; --card:#1d2026;
          --line:#33383f; --acc:#7aa2ff; --ok:#4ade80; --bad:#f87171; }
}
* { box-sizing:border-box }
body { margin:0; background:var(--bg); color:var(--fg);
  font:15px/1.5 -apple-system, "Segoe UI", sans-serif; }
header { padding:.8rem 1.2rem; border-bottom:1px solid var(--line);
  display:flex; gap:1rem; align-items:baseline; flex-wrap:wrap;
  position:sticky; top:0; background:var(--bg); z-index:5;}
header h1 { font-size:1.05rem; margin:0 }
nav { display:flex; gap:.4rem; flex-wrap:wrap }
nav button { border:1px solid var(--line); background:var(--card);
  color:var(--fg); border-radius:999px; padding:.25rem .8rem; cursor:pointer;
  font-size:.85rem; }
nav button.active { border-color:var(--acc); color:var(--acc); font-weight:600 }
main { max-width:62rem; margin:0 auto; padding:1rem 1.2rem 4rem; }
.blurb { color:var(--muted); font-size:.88rem; margin:.6rem 0 0 }
.card { background:var(--card); border:1px solid var(--line);
  border-radius:10px; padding:.9rem 1rem; margin:.8rem 0; }
.card h3 { margin:0 0 .4rem; font-size:.95rem;
  font-family:ui-monospace,monospace; display:flex; gap:.6rem;
  align-items:center; flex-wrap:wrap }
.fields { font-size:.86rem; color:var(--muted) }
.fields div { margin:.12rem 0; overflow-wrap:anywhere }
.flabel { color:var(--fg); font-weight:600 }
.stmt { width:100%; min-height:3.6rem; margin:.5rem 0 0; padding:.5rem;
  border:1px solid var(--line); border-radius:6px; background:var(--bg);
  color:var(--fg); font:inherit; font-size:.9rem; }
.row { display:flex; gap:.4rem; margin-top:.6rem; flex-wrap:wrap;
  align-items:center }
.row button { border:1px solid var(--line); background:var(--bg);
  color:var(--fg); border-radius:6px; padding:.25rem .6rem; cursor:pointer;
  font-size:.82rem }
.row button.sel { border-color:var(--acc); color:var(--acc); font-weight:700 }
.row button.approve.sel { border-color:var(--ok); color:var(--ok) }
.row button.reject.sel { border-color:var(--bad); color:var(--bad) }
.anchors { margin-top:.5rem; display:flex; gap:.5rem; flex-wrap:wrap }
.anchors .kn { border:1px solid var(--line); border-radius:6px;
  background:var(--bg); color:var(--acc); padding:.2rem .55rem;
  cursor:pointer; font-size:.82rem }
.anchors .kn.open { border-color:var(--acc); font-weight:600 }
.anchors a { font-size:.78rem; color:var(--muted); align-self:center }
.knowl { border-left:3px solid var(--acc); background:var(--bg);
  margin:.6rem 0 0; padding:.6rem .8rem; border-radius:0 8px 8px 0;
  font-size:.92rem; overflow-x:auto }
.knowl article { margin:0 }
.knowl a.lean-link { display:inline-block; font-size:.75rem;
  font-family:ui-monospace,monospace; padding:.05rem .5rem;
  margin:.15rem .3rem 0 0; border:1px solid rgba(25,100,60,.4);
  border-radius:999px; background:rgba(40,160,90,.08);
  text-decoration:none; color:inherit }
.preview { margin:.45rem 0 0; padding:.5rem .65rem; border:1px dashed var(--line);
  border-radius:6px; background:var(--bg); font-size:.9rem; min-height:1.4rem }
.preview .cite { display:inline-block; border:1px solid var(--line);
  border-radius:4px; padding:0 .3rem; font-size:.8rem; color:var(--acc);
  cursor:help; background:var(--card) }
.preview .cite.unknown { color:var(--bad); border-color:var(--bad) }
.pickrow { display:flex; gap:.4rem; align-items:center; margin-top:.3rem }
.pickrow select { font:inherit; font-size:.8rem; background:var(--bg);
  color:var(--fg); border:1px solid var(--line); border-radius:6px;
  padding:.2rem .4rem; max-width:34rem }
.preview .cite.haspdf { text-decoration:underline dotted }
.preview .xrf { color:var(--acc); cursor:pointer;
  border-bottom:1px dotted var(--acc) }
.preview .xrf.unknown { color:var(--bad); border-color:var(--bad) }
.pickrow label { font-size:.78rem; color:var(--muted) }
.note { flex:1; min-width:12rem; padding:.3rem .5rem; font:inherit;
  font-size:.84rem; border:1px solid var(--line); border-radius:6px;
  background:var(--bg); color:var(--fg); }
.saved { color:var(--ok); font-size:.8rem; opacity:0; transition:opacity .25s }
.saved.show { opacity:1 }
.status-pill { font-size:.75rem; padding:.1rem .5rem; border-radius:999px;
  border:1px solid var(--line); color:var(--muted) }
.count { color:var(--muted); font-size:.85rem }
.paperlink { margin-left:auto; font-size:.85rem; color:var(--acc);
  text-decoration:none; border:1px solid var(--line); border-radius:999px;
  padding:.2rem .7rem }
.paperlink:hover { border-color:var(--acc) }
/* help hovertext — same idiom as the paper's notation popups */
.help { cursor:help; border-bottom:1px dotted var(--muted) }
.qmark { cursor:help; display:inline-block; width:1.05rem; height:1.05rem;
  border:1px solid var(--muted); border-radius:50%; color:var(--muted);
  font-size:.72rem; line-height:1.02rem; text-align:center; margin-left:.25rem;
  user-select:none }
#tooltip { position:absolute; z-index:50; max-width:26rem; background:var(--bg);
  color:var(--fg); border:1px solid var(--line); border-radius:6px;
  box-shadow:0 6px 18px rgba(0,0,0,.2); padding:.45rem .6rem;
  font-size:.82rem; line-height:1.4; pointer-events:none; opacity:0;
  transition:opacity .12s }
#tooltip.show { opacity:1 }
#tooltip b { display:block; margin-bottom:.15rem }
</style>
</head>
<body>
<header>
  <h1>paperforge review</h1>
  <nav id="tabs"></nav>
  <span class="count" id="count"></span>
  <a class="paperlink" href="/paper/index.html" target="paper">open the paper ↗</a>
</header>
<main>
  <div class="blurb" id="blurb"></div>
  <div id="cards"></div>
</main>
<div id="tooltip"></div>
<script>
"use strict";
let current = null, arts = [], macrosHtml = null, BIB = null;

/* MathJax loads async; previews render before it is ready. Wait, then
   typeset — every math consumer goes through this. */
function mjReady() {
  return new Promise(res => {
    (function poll(n) {
      if (window.MathJax && MathJax.startup && MathJax.startup.promise)
        MathJax.startup.promise.then(res);
      else if (n < 200) setTimeout(() => poll(n + 1), 60);
      else res();
    })(0);
  });
}
async function typeset(el) {
  await mjReady();
  if (window.MathJax && MathJax.typesetPromise)
    await MathJax.typesetPromise([el]).catch(() => {});
}
async function ensureBib() {
  if (BIB === null) BIB = await (await fetch("/api/bib")).json();
  return BIB;
}
let TAGS = null;
async function ensureTags() {
  if (TAGS === null) TAGS = await (await fetch("/api/tags")).json();
  return TAGS;
}
function refDisplay(rec) {
  const kindNames = { theorem:"Theorem", proposition:"Proposition",
    lemma:"Lemma", corollary:"Corollary", definition:"Definition",
    remark:"Remark", claim:"Claim", section:"Section", subsection:"Section",
    appendix:"Appendix", equation:"eq.", "align-row":"eq." };
  const k = kindNames[rec.kind] || rec.kind;
  return k === "eq." ? `eq. ${rec.number}` : `${k} ${rec.number}`;
}

/* ---------------- tooltip (question-mark hovertext) ---------------- */
const tip = document.getElementById("tooltip");
function showTip(el, html) {
  tip.innerHTML = html;
  const r = el.getBoundingClientRect();
  tip.style.top = (window.scrollY + r.bottom + 6) + "px";
  tip.style.left = Math.min(window.scrollX + r.left,
                            window.scrollX + innerWidth - 440) + "px";
  tip.classList.add("show");
}
function hideTip() { tip.classList.remove("show"); }
function esc(s) { return (s || "").replace(/&/g, "&amp;")
  .replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function helpSpan(text, help) {
  const s = document.createElement("span");
  s.className = "help"; s.textContent = text;
  s.onmouseenter = () => showTip(s, esc(help));
  s.onmouseleave = hideTip;
  return s;
}
function qmark(html) {
  const q = document.createElement("span");
  q.className = "qmark"; q.textContent = "?";
  q.onmouseenter = () => showTip(q, html);
  q.onmouseleave = hideTip;
  return q;
}

/* ---------------- data ---------------- */
async function loadTabs() {
  arts = await (await fetch("/api/artifacts")).json();
  const nav = document.getElementById("tabs");
  nav.innerHTML = "";
  for (const a of arts) {
    const b = document.createElement("button");
    b.textContent = `${a.label} (${a.count})`;
    b.onclick = () => { current = a.name; render(); refreshTabs(); };
    b.dataset.name = a.name;
    nav.appendChild(b);
  }
  if (!current && arts.length) current = arts[0].name;
  refreshTabs();
}
function refreshTabs() {
  document.querySelectorAll("#tabs button").forEach(b =>
    b.classList.toggle("active", b.dataset.name === current));
  const a = arts.find(x => x.name === current);
  document.getElementById("blurb").textContent = a ? a.blurb : "";
}

async function render() {
  const items = await (await fetch(`/api/items?artifact=${current}`)).json();
  document.getElementById("count").textContent = `${items.length} items`;
  const main = document.getElementById("cards");
  main.innerHTML = "";
  for (const it of items) main.appendChild(card(it));
}

/* ---------------- saving (all interactions autosave) ---------------- */
async function decide(payload) {
  const r = await fetch("/api/decide", { method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload) });
  if (!r.ok) alert("save failed: " + (await r.text()));
  return r.ok;
}
function flash(el) {
  const s = el.querySelector(".saved");
  s.classList.add("show");
  setTimeout(() => s.classList.remove("show"), 1100);
}
function autosaver(el, it, getPayload) {
  let t = null;
  const fire = async () => { if (await decide(getPayload())) flash(el); };
  return { input: () => { clearTimeout(t); t = setTimeout(fire, 700); },
           blur: () => { clearTimeout(t); fire(); } };
}

/* ---------------- knowls (in-place paper context) ---------------- */
async function ensureMacros(panel) {
  if (macrosHtml === null)
    macrosHtml = (await (await fetch("/api/macros")).json()).html || "";
  if (macrosHtml && !document.getElementById("latex-macros")) {
    const d = document.createElement("div");
    d.innerHTML = macrosHtml;
    d.style.display = "none";
    document.body.prepend(d);
    await typeset(d);
  }
}
const openPanels = new Map();   // marker element -> its open knowl panel
async function toggleKnowl(tag, host, marker) {
  const prev = openPanels.get(marker);
  if (prev) { prev.remove(); openPanels.delete(marker);
              marker.classList.remove("open"); return; }
  marker.classList.add("open");
  const panel = document.createElement("div");
  panel.className = "knowl";
  panel.textContent = "loading…";
  host.appendChild(panel);
  openPanels.set(marker, panel);
  const r = await fetch(`/api/fragment?tag=${encodeURIComponent(tag)}`);
  if (!r.ok) { panel.textContent = "no preview — open in paper ↗"; return; }
  await ensureMacros(panel);
  panel.innerHTML = (await r.json()).html;
  typeset(panel);
}
function knowlButton(link, host) {
  const b = document.createElement("button");
  b.className = "kn"; b.textContent = link.label;
  b.onclick = () => toggleKnowl(link.tag, host, b);
  return b;
}

/* ---------------- cards ---------------- */
function card(it) {
  const el = document.createElement("div");
  el.className = "card";

  const h = document.createElement("h3");
  h.textContent = it.title + " ";
  const pill = document.createElement("span");
  pill.className = "status-pill"; pill.textContent = it.status;
  h.appendChild(pill);
  el.appendChild(h);

  const fs = document.createElement("div");
  fs.className = "fields";
  for (const f of it.fields || []) {
    const d = document.createElement("div");
    d.appendChild(helpSpan(f.label, f.help));
    if (f.value) d.appendChild(document.createTextNode(": " + f.value));
    fs.appendChild(d);
  }
  el.appendChild(fs);

  let stmt = null, preview = null;
  if (it.text !== null && it.text !== undefined) {
    stmt = document.createElement("textarea");
    stmt.className = "stmt"; stmt.value = it.text;
    stmt.title = it.text_help || "";
    el.appendChild(stmt);

    preview = document.createElement("div");
    preview.className = "preview";
    el.appendChild(preview);

    const pick = document.createElement("div");
    pick.className = "pickrow";
    const lab = document.createElement("label");
    lab.textContent = "insert citation:";
    const sel = document.createElement("select");
    sel.innerHTML = "<option value=''>\\cite{…}</option>";
    ensureBib().then(bib => {
      for (const k of Object.keys(bib).sort())
        sel.insertAdjacentHTML("beforeend",
          `<option value="${k}">${k.replace(/^bib-/, "")} — ${esc(bib[k].short)}</option>`);
    });
    sel.onchange = () => {
      if (!sel.value) return;
      const pos = stmt.selectionStart ?? stmt.value.length;
      const key = sel.value.replace(/^bib-/, "");
      stmt.value = stmt.value.slice(0, pos) + `\\cite{${key}}`
                 + stmt.value.slice(pos);
      sel.value = "";
      stmt.dispatchEvent(new Event("input", { bubbles: true }));
    };
    pick.appendChild(lab); pick.appendChild(sel);
    pick.appendChild(qmark("<b>Statement LaTeX</b>" +
      esc("$…$ math (the paper's macros work) · \\cite{KEY} or " +
          "\\cite[pin]{KEY} citations · \\emph{…} · \\texttt{…} · " +
          "-- and --- dashes. Rendered to the introduction through the " +
          "same converter as the paper itself (\\cite becomes a real " +
          "cross-reference).")));
    el.appendChild(pick);

    let pt = null;
    const renderPreview = async () => {
      const bib = await ensureBib();
      const tags = await ensureTags();
      let h = esc(stmt.value);
      // \cref{label} / \ref / \eqref -> resolved internal-reference chips
      h = h.replace(/\\(?:[cC]ref|ref|eqref)\{([^}]*)\}/g, (m0, label) => {
        const rec = tags[label.trim()];
        if (!rec) return `<span class="xrf unknown" data-t="">${label}??</span>`;
        return `<span class="xrf" data-t="${rec.tag}">${refDisplay(rec)}</span>`;
      });
      // \cite[pin]{K1,K2} -> chips (mirror of tex2ptx.convert_inline)
      h = h.replace(/\\cite(?:\[([^\]]*)\])?\{([^}]*)\}/g, (m0, pin, keys) =>
        keys.split(",").map(k => {
          const key = "bib-" + k.trim();
          const known = key in bib;
          const label = k.trim() + (pin ? ", " + pin : "");
          return `<span class="cite ${known ? "" : "unknown"}" data-k="${key}">[${label}]</span>`;
        }).join(", "));
      h = h.replace(/\$([^$]+)\$/g, "\\($1\\)");
      h = h.replace(/\\emph\{([^}]*)\}/g, "<em>$1</em>")
           .replace(/\\textit\{([^}]*)\}/g, "<em>$1</em>");
      h = h.replace(/\\texttt\{([^}]*)\}/g,
                    (m0, c) => "<code>" + c.replace(/\\_/g, "_") + "</code>");
      h = h.replace(/---/g, "—").replace(/--/g, "–").replace(/~/g, " ");
      preview.innerHTML = h;
      preview.querySelectorAll(".xrf").forEach(x => {
        const tg = x.dataset.t;
        x.onmouseenter = () => showTip(x, tg
          ? `<b>${esc(tg)}</b>internal reference (resolved from the crosswalk; renders as a live cross-reference in the paper). Click for the statement.`
          : "unknown label — not in the paper's numbering database");
        x.onmouseleave = hideTip;
        if (tg) x.onclick = () => toggleKnowl(tg, knowlHost, x);
      });
      preview.querySelectorAll(".cite").forEach(c => {
        const k = c.dataset.k, e = bib[k];
        if (e && e.pdf) c.classList.add("haspdf");
        c.onmouseenter = () => showTip(c, `<b>${esc(k)}</b>` +
          esc(e ? e.text : "no such bibliography entry — fix the key or add a new_refs entry") +
          (e && e.pdf ? "<br><b>📄 local PDF — click to open</b>" : ""));
        c.onmouseleave = hideTip;
        if (e && e.pdf) c.onclick = () => window.open(e.pdf, "refpdf");
      });
      await ensureMacros(preview);
      await typeset(preview);
    };
    stmt.addEventListener("input", () => {
      clearTimeout(pt); pt = setTimeout(renderPreview, 500);
    });
    renderPreview();
  }

  const anchors = document.createElement("div");
  anchors.className = "anchors";
  const knowlHost = document.createElement("div");
  for (const l of it.links || []) {
    anchors.appendChild(knowlButton(l, knowlHost));
    const a = document.createElement("a");
    a.href = l.href; a.target = "paper"; a.textContent = "↗";
    a.title = "open in the full paper";
    anchors.appendChild(a);
  }
  el.appendChild(anchors);
  el.appendChild(knowlHost);

  const choices = document.createElement("div");
  choices.className = "row";
  for (const c of it.choices) {
    const b = document.createElement("button");
    b.textContent = c;
    if (c.includes("approved") || c.startsWith("known")) b.classList.add("approve");
    if (c.includes("reject")) b.classList.add("reject");
    if (c === it.status) b.classList.add("sel");
    const hh = (it.choice_help || {})[c];
    if (hh) { b.onmouseenter = () => showTip(b, `<b>${esc(c)}</b>${esc(hh)}`);
              b.onmouseleave = hideTip; }
    b.onclick = async () => {              // autosaves immediately
      if (!await decide({ artifact: current, id: it.id, status: c })) return;
      choices.querySelectorAll("button").forEach(x => x.classList.remove("sel"));
      b.classList.add("sel");
      pill.textContent = c;
      flash(el);
    };
    choices.appendChild(b);
  }
  const legend = qmark("<b>What the options mean</b>" +
    it.choices.map(c => `<b>${esc(c)}</b>${esc((it.choice_help || {})[c] || "")}`)
      .join(""));
  choices.appendChild(legend);
  el.appendChild(choices);

  const noteRow = document.createElement("div");
  noteRow.className = "row";
  const note = document.createElement("input");
  note.className = "note";
  note.placeholder = "note to the pipeline (autosaves)";
  note.value = it.note || "";
  const saved = document.createElement("span");
  saved.className = "saved"; saved.textContent = "saved ✓";
  noteRow.appendChild(note); noteRow.appendChild(saved);
  el.appendChild(noteRow);

  const saver = autosaver(el, it, () => {
    const p = { artifact: current, id: it.id, note: note.value };
    if (stmt) p.text = stmt.value;
    return p;
  });
  note.addEventListener("input", saver.input);
  note.addEventListener("blur", saver.blur);
  if (stmt) { stmt.addEventListener("input", saver.input);
              stmt.addEventListener("blur", saver.blur); }
  return el;
}

loadTabs().then(render);
</script>
</body>
</html>
