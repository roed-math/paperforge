# paperforge instance config. Copied into a new instance by `paper-init`.
# Paths are relative to the instance repo root unless absolute.

[paper]
title = "Title of the paper"
instance_name = "gq2"          # short slug; used for output filenames

[inputs]
# The AI-written LaTeX draft. Also serves as a plagiarism baseline (see below).
ai_draft = "inputs/draft/main.tex"
# The Lean formalization: a lake project root (may be an absolute path elsewhere).
lean_project = "/Users/roed/claude/gq2-lean"
# How <lean ref="X"> becomes a docs URL (doc-gen4 / Verso output). Sets the
# `lean.docs.base` XSL param in custom-html.xsl.
lean_docs_base = "https://roed.example/gq2-lean/docs/"

# Known historical snapshots of the paper (the draft is a moving target; the
# formalization may cite an older version's numbering). Each snapshot gets a
# numbering map under [crosswalk] dir.
# [snapshots.v1]
# description = "version the formalization tracked"
# tex = "path/to/old.tex"      # preferred: exact numbering via the simulator
# pdf = "path/to/old.pdf"      # fallback: recover statement numbers by title-match

[crosswalk]
# Stable-tag system: xml:ids are the canonical identity of every numbered item;
# printed numbers are presentation-specific (LaTeX global vs PreTeXt per-section
# vs old snapshots). See the numbering_drift validator and ingest/lean_ledger.py.
dir = "crosswalk/"
baseline = "v1"    # which snapshot the formalization's prose citations use

[style]
# Prior writing samples that define the author's voice (verbatim reference).
corpus = "style-corpus/"
# Free-text advice on mathematical writing, fed to every generative skill.
advice = "style-corpus/ADVICE.md"

[references]
pdf_dir = "references/"         # local copies of cited works (for the ref check)
bib     = "source/references.bib"

[notation]
# HTML hover affordance: a \notn use more than far_words after its definition
# is rewritten to \notnfar (visible dotted underline) by ingest/notation_far.py.
# Derived data — recompute after edits; never hand-write \notnfar.
far_words = 1500

[detail]
default_level = 1              # PDF/default tier: render content with level <= this
max_level     = 3              # highest tier the HTML slider exposes

[plagiarism]
ngram     = 7      # flag verbatim spans of >= this many words
error_run = 12     # runs at least this long are errors (shorter: warnings)
# External sources only. The AI draft ([inputs] ai_draft) is NOT a flag-source:
# it is the provenance baseline (inherited-from-draft vs pipeline-added labels).
sources = ["references/"]

[build]
# FOLLOW-UP: the spike imports the core XSL by absolute path. Until the portable
# import is sorted, point this at the installed PreTeXt core for this machine.
pretext_core_xsl = "/Users/roed/.ptx/2.43.2/core/xsl/pretext-html.xsl"
web_output   = "output/web"
print_output = "output/print"
